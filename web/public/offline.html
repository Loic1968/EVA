<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#DC2626" />
    <title>EVA — Offline</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1.5rem;
        font-family: Inter, system-ui, -apple-system, sans-serif;
        background: #0f172a;
        color: #e2e8f0;
      }
      .card {
        max-width: 24rem;
        text-align: center;
      }
      .logo {
        width: 4rem;
        height: 4rem;
        margin: 0 auto 1.25rem;
        border-radius: 1rem;
        background: linear-gradient(135deg, #dc2626, #b91c1c);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.5rem;
        font-weight: 700;
        color: white;
      }
      h1 { font-size: 1.25rem; font-weight: 600; margin-bottom: 0.5rem; }
      p { color: #94a3b8; font-size: 0.9375rem; line-height: 1.5; margin-bottom: 1.5rem; }
      button {
        appearance: none;
        border: none;
        border-radius: 0.625rem;
        padding: 0.75rem 1.25rem;
        font-size: 0.9375rem;
        font-weight: 500;
        color: white;
        background: #dc2626;
        cursor: pointer;
      }
      button:active { opacity: 0.9; }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="logo">E</div>
      <h1>You’re offline</h1>
      <p>EVA needs a network connection for chat, email, and calendar. Reconnect and try again.</p>
      <button type="button" onclick="location.reload()">Retry</button>
    </div>
  </body>
</html>
